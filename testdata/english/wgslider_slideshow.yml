-
    id: '1'
    name: Default
    descr: 'Default slideshow without any additional requirements'
    tpl: wgslider_slideshow_default.tpl
    credits: ''
    params: '{"timeout":4000}'
    status: '2'
-
    id: '2'
    name: 'Bootstrap3 Carousel'
    descr: 'Bootstrap3 Carousel requires a theme based on Bootstrap 3'
    tpl: wgslider_slideshow_bt3.tpl
    credits: 'https://getbootstrap.com'
    params: '{"interval":4000,"pause":"hover","wrap":"true","keyboard":"true","show_indicator":"true","show_prev_next":"true","fullsize":"true"}'
    status: '2'
-
    id: '3'
    name: 'Bootstrap5 Carousel'
    descr: 'Bootstrap5 Carousel requires a theme based on Bootstrap 5'
    tpl: wgslider_slideshow_bt5.tpl
    credits: 'https://getbootstrap.com'
    params: '{"interval":4000,"pause":"hover","wrap":"true","keyboard":"true","touch":"true","show_indicator":"true","show_prev_next":"true","show_caption":"true","show_descr":"true","fullsize":"true"}'
    status: '2'
-
    id: '4'
    name: Swiper
    descr: 'Swiper Slideshow without any additional requirements'
    tpl: wgslider_slideshow_swiper.tpl
    credits: 'https://swiperjs.com'
    params: '{"delay":4000,"effect":"slide","perview":1,"autoplay":1,"show_indicator":"true","show_prev_next":"true","show_caption":"true","show_descr":"true","pauseOnMouse":"true","bg_caption":"hard","autoheight":"true"}'
    status: '2'
